<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>满の博客</title>
    <style>
      /* 设置全局字体和背景颜色 */
      body {
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
      }

      /* 定义文章框的样式 */
      .post {
        border: 1px solid #ccc;
        padding: 10px;
        margin-bottom: 20px;
        background-color: #fff;
      }

      /* 定义文章标题的样式 */
      .post h2 {
        font-size: 24px;
        margin-bottom: 5px;
      }

      /* 定义文章日期的样式 */
      .post .date {
        font-style: italic;
        font-size: 12px;
        color: #999;
        margin-bottom: 10px;
      }

      /* 定义文章内容的样式 */
      .post p {
        line-height: 1.5;
      }

      /* 定义侧边栏的样式 */
      .sidebar {
        border: 1px solid #ccc;
        padding: 10px;
        background-color: #fff;
      }

      /* 定义侧边栏小标题的样式 */
      .sidebar h3 {
        font-size: 18px;
        margin-bottom: 10px;
      }

      /* 定义侧边栏链接的样式 */
      .sidebar a {
        color: #333;
        text-decoration: none;
      }

      /* 定义侧边栏链接悬停时的样式 */
      .sidebar a:hover {
        color: #000;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>满の博客</h1>
    </header>

    <div class="content">
      <div class="post">
        <h2>欢迎</h2>
        <div class="date">2023-04-11</div>
        <p>欢迎大家来到我的blog，在这里，我会更新关于平时的一些写代码的技巧。</p>
      </div>
    </div>

    <aside class="sidebar">
      <h3>分类</h3>
      <ul>
        <li><a href="https://mcxgjkh.github.io/blog/index.html">主站</a></li>
        <li><a href="https://mcxgjkh.github.io/blog/www/jishu.html">技术</a></li>
        <li><a href="#">生活</a></li>
        <li><a href="#">旅游</a></li>
      </ul>

      <h3>标签</h3>
      <ul>
        <li><a href="https://github.com/mcxgjkh/blog/blob/main/index.html">HTML</a></li>
        <li><a href="https://github.com/mcxgjkh/blog/edit/main/www/jishu.html">HTML技术</a></li>
        <li><a href="https://github.com/mcxgjkh/blog">JavaScript</a></li>
      </ul>
    </aside>

    <footer>
      <p>本站基于Github Pages搭建</p>
      <p>&copy; 2023 满城箫管尽开花</p>
    </footer>
  </body>
</html>
